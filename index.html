<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Ideas Vault</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- Token Setup Screen -->
    <div id="setup-screen" class="screen hidden">
      <div class="setup-card">
        <div class="setup-icon">🗄️</div>
        <h1>My Ideas Vault</h1>
        <p>Connect your GitHub vault to get started. You'll need a Personal Access Token with <code>repo</code> scope.</p>
        <a class="setup-link" href="https://github.com/settings/tokens/new?scopes=repo&description=My+Ideas+Vault" target="_blank">
          Create a GitHub Token →
        </a>
        <input type="password" id="setup-token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
        <button class="btn-primary full-width" onclick="connectVault()">Connect Vault</button>
        <p id="setup-error" class="error-msg hidden"></p>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-screen" class="screen hidden">

      <!-- Header -->
      <header class="header">
        <div class="header-inner">
          <div class="logo">
            <span class="logo-icon">🗄️</span>
            <span class="logo-text">My Ideas Vault</span>
          </div>
          <div class="header-actions">
            <button class="icon-btn" onclick="loadAllNotes(true)" title="Refresh">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            </button>
            <button class="icon-btn" onclick="openModal('settings-modal')" title="Settings">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
            </button>
          </div>
        </div>
      </header>

      <!-- Sticky Search + Filters -->
      <div class="sticky-bar">
        <div class="search-wrap">
          <span class="search-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" id="search-input" placeholder="Search everything in your vault..." oninput="handleSearch(this.value)" />
          <button class="clear-search hidden" id="clear-search" onclick="clearSearch()">×</button>
        </div>
        <div class="categories-scroll">
          <div class="categories" id="category-filters"></div>
        </div>
      </div>

      <!-- Content -->
      <main class="main-content">
        <div id="stats-bar" class="stats-bar"></div>
        <div id="notes-grid" class="notes-grid"></div>
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-icon">🔍</div>
          <p>Nothing found. Try a different search or category.</p>
        </div>
      </main>

      <!-- FAB -->
      <button class="fab" onclick="openModal('add-modal')" title="Add new idea">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

    </div>

    <!-- Add Note Modal -->
    <div id="add-modal" class="modal hidden" onclick="modalBackdropClick(event, 'add-modal')">
      <div class="modal-card">
        <div class="modal-header">
          <h3>Save New Idea</h3>
          <button class="close-btn" onclick="closeModal('add-modal')">×</button>
        </div>
        <form id="add-form" onsubmit="saveNote(event)">
          <div class="form-group">
            <label for="note-title">Title <span class="required">*</span></label>
            <input type="text" id="note-title" placeholder="What's on your mind?" required autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="note-category">Category <span class="required">*</span></label>
            <select id="note-category"></select>
          </div>
          <div class="form-group">
            <label for="note-content">Content</label>
            <textarea id="note-content" placeholder="Write your idea, learning, or inspiration..." rows="6"></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="closeModal('add-modal')">Cancel</button>
            <button type="submit" class="btn-primary" id="save-btn">Save to Vault</button>
          </div>
        </form>
      </div>
    </div>

    <!-- View Note Modal -->
    <div id="view-modal" class="modal hidden" onclick="modalBackdropClick(event, 'view-modal')">
      <div class="modal-card modal-card-wide">
        <div class="modal-header">
          <div class="view-meta">
            <span id="view-badge" class="cat-badge"></span>
            <span id="view-date" class="view-date"></span>
          </div>
          <button class="close-btn" onclick="closeModal('view-modal')">×</button>
        </div>
        <div id="view-content" class="view-content markdown-body"></div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden" onclick="modalBackdropClick(event, 'settings-modal')">
      <div class="modal-card">
        <div class="modal-header">
          <h3>Settings</h3>
          <button class="close-btn" onclick="closeModal('settings-modal')">×</button>
        </div>
        <div class="form-group">
          <label for="settings-token">GitHub Token</label>
          <input type="password" id="settings-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
          <p class="field-hint">Token is stored only in your browser's localStorage.</p>
        </div>
        <div class="form-actions">
          <button class="btn-danger" onclick="disconnectVault()">Disconnect Vault</button>
          <button class="btn-primary" onclick="updateToken()">Save Token</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

  </div>
  <script src="app.js"></script>
</body>
</html>
